<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CARS Adaptado — Escala de Avaliação do Autismo na Infância</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>CARS Adaptado</h1>
      <p>Escala de Avaliação do Autismo na Infância (NICE Guidelines)</p>
    </header>

    <!-- TELA 1: Cadastro -->
    <div id="screen-1" class="screen active">
      <div class="card">
        <h2>Dados do Paciente</h2>
        <div class="form-grid">
          <div class="form-group full">
            <label for="paciente-nome">Nome do paciente</label>
            <input type="text" id="paciente-nome" placeholder="Nome completo">
          </div>
          <div class="form-group">
            <label for="paciente-idade">Idade (anos)</label>
            <input type="number" id="paciente-idade" min="0" max="99" placeholder="Idade">
          </div>
          <div class="form-group">
            <label for="avaliador">Avaliador</label>
            <input type="text" id="avaliador" placeholder="Nome do profissional">
          </div>
          <div class="form-group full">
            <label for="data-avaliacao">Data da avaliação</label>
            <input type="date" id="data-avaliacao">
          </div>
        </div>
        <div class="btn-group" style="justify-content: flex-end;">
          <button class="btn btn-primary" onclick="goToResultados()">Iniciar Avaliação</button>
        </div>
      </div>
    </div>

    <!-- TELA 2: Questionário -->
    <div id="screen-2" class="screen">
      <div class="progress-container no-print">
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
        </div>
        <div id="progress-text" class="progress-text">0 de 15 respondidas</div>
      </div>

      <div id="questions-container"></div>

      <div class="btn-group no-print">
        <button class="btn btn-outline" onclick="showScreen(1)">Voltar</button>
        <button class="btn btn-success" onclick="goToResultado()">Calcular Resultado</button>
      </div>
    </div>

    <!-- TELA 3: Resultado -->
    <div id="screen-3" class="screen">
      <div class="card result-card">
        <div id="res-paciente" class="patient-info"></div>
        <h2>Resultado CARS</h2>
        <div id="res-score" class="result-score">0</div>
        <div class="result-label">Pontuação Total (máx. 60)</div>
        <div id="res-class" class="result-classification"></div>
        <div id="score-dots" class="score-breakdown"></div>
        <div class="btn-group" style="justify-content: center; margin-top: 24px;">
          <button class="btn btn-outline no-print" onclick="novaAvaliacao()">Nova Avaliação</button>
          <button class="btn btn-primary no-print" onclick="gerarPDF()">Gerar PDF</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
